<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuj Medical</title>

<style>
    body {
        margin: 0;
        background-color: #222222;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        min-height: 100vh;
        text-align: center;
    }

    .logo {
        width: min(800px, 85vw);
        height: auto;
    }

    .coming-soon {
        margin-top: 10px;
        font-size: 1.1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #d0d0d0;
    }

    .linkedin {
        margin-top: 30px;
    }

    .linkedin a {
        color: #fdbb2d;
        text-decoration: none;
        font-weight: 500;
    }

    .linkedin a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

    <img src="logo.png" alt="Yuj Medical" class="logo">

    <div class="coming-soon">
        Website Coming Soon
    </div>

    <div class="linkedin">
        <a href="https://www.linkedin.com/company/yuj-medical/" target="_blank">
            Follow us on LinkedIn
        </a>
    </div>

</body>
</html>
